name: Deploy Mintlify to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify CLI and Export
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm install -g mint
          mint export

      - name: Unzip and Global Path Rewrite
        run: |
          unzip export.zip -d out_temp
          mkdir out
          cp -r out_temp/* out/ || true
          
          # Create the .nojekyll file so GitHub serves underscore folders
          touch out/.nojekyll
          
          # 1. Fix global asset frameworks
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|"/_next/|"/TuLIP-docs/_next/|g' {} +
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|"/assets/|"/TuLIP-docs/assets/|g' {} +
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|"/images/|"/TuLIP-docs/images/|g' {} +
          
          # 2. Fix internal Next.js client-side page routing links
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|href="/|href="/TuLIP-docs/|g' {} +
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|src="/|src="/TuLIP-docs/|g' {} +
          
          # 3. Catch URL-encoded variants that Next.js uses for dynamic image modules
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|%2F_next%2F|%2FTuLIP-docs%2F_next%2F|g' {} +
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|%2Fassets%2F|%2FTuLIP-docs%2Fassets%2F|g' {} +
          find out -type f \( -name "*.html" -o -name "*.js" \) -exec sed -i 's|%2Fimages%2F|%2FTuLIP-docs%2Fimages%2F|g' {} +

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
