name: Deploy Mintlify to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify CLI and Export
        # We pass the asset prefix directly to the compiler so it handles paths perfectly
        env:
          ASSET_PREFIX: /TuLIP-docs
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm install -g mint
          mint export

      - name: Unzip and Prepare Output
        run: |
          unzip export.zip -d out_temp
          mkdir out
          cp -r out_temp/* out/ || true
          
          # Create the critical .nojekyll file so GitHub serves the underscore folders
          touch out/.nojekyll

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
