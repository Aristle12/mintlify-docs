name: Deploy Mintlify to GitHub Pages

on:
  push:
    branches:
      - main # Change this to 'master' if your main branch is called master

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Mintlify CLI and Export
        run: |
          PUPPETEER_SKIP_DOWNLOAD=true npm install -g mint
          mint export

      - name: Unzip and Prepare Static Files
        run: |
          unzip export.zip -d out_temp
          # Mintlify nests the export. Move everything to a clean 'out' directory
          mkdir out
          cp -r out_temp/* out/ || true

      - name: Deploy to GitHub Pages Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages # This automatically pushes your built HTML to a clean branch
